- name: "zsh"
  block:
    - name: install zsh
      package:
        name: zsh
        state: latest

    - name: change user shell to zsh
      become: true
      become_user: root
      command: chsh -s /bin/zsh {{ ansible_user }}

    - name: remove oh-my-zsh
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: absent
      loop:
        - .oh-my-zsh

    - name: install oh my zsh
      shell: |
        ZSH="/home/{{ ansible_user }}/.oh-my-zsh" ZSH_DISABLE_COMPFIX=true sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
      register: result

    - name: remove files
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: absent
      loop:
        - .profile.dev
        - .zshrc

    - name: stow zsh shell files
      import_tasks: "roles/common/stow_directory.yml"
      vars:
        directory: zsh

    - name: install syntax highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "/home/{{ ansible_user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        update: no

    - name: install autosuggestions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "/home/{{ ansible_user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        update: no

    - name: delete obsolete files
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: absent
      loop:
        - .zshrc.pre-oh-my-zsh

  when: ansible_distribution in ["Debian", "Ubuntu", "Pop!_OS"]
